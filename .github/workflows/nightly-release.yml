name: Nightly Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  change-detection:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const currentSha = context.sha;
            const eventName = context.eventName;

            if (eventName === "workflow_dispatch") {
              core.setOutput("should_run", "true");
              core.setOutput("reason", "Manual dispatch always runs.");
              return;
            }

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const nightlyRelease = releases.find((release) =>
              !release.draft &&
              /^v.+-nightly\./.test(release.tag_name)
            );

            if (!nightlyRelease) {
              core.setOutput("should_run", "true");
              core.setOutput("reason", "No previous nightly release exists.");
              return;
            }

            let nightlySha;
            try {
              const ref = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${nightlyRelease.tag_name}`,
              });

              nightlySha = ref.data.object.sha;
              if (ref.data.object.type === "tag") {
                const tag = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: nightlySha,
                });
                nightlySha = tag.data.object.sha;
              }
            } catch (error) {
              core.setOutput("should_run", "true");
              core.setOutput(
                "reason",
                `Unable to resolve ${nightlyRelease.tag_name}; running nightly build.`
              );
              return;
            }

            const shouldRun = nightlySha !== currentSha;
            const reason = shouldRun
              ? `Changes detected since ${nightlyRelease.tag_name} (${nightlySha}).`
              : `No changes since ${nightlyRelease.tag_name} (${nightlySha}).`;

            core.setOutput("should_run", shouldRun ? "true" : "false");
            core.setOutput("reason", reason);

      - name: Report decision
        run: echo "${{ steps.detect.outputs.reason }}"

  metadata:
    needs: change-detection
    if: needs.change-detection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_name: ${{ steps.vars.outputs.release_name }}
      base_version: ${{ steps.vars.outputs.base_version }}
      nightly_stamp: ${{ steps.vars.outputs.nightly_stamp }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain semantic version text like 0.1.0" >&2
            exit 1
          fi
          nightly_day="$(date -u +%Y%m%d)"
          nightly_stamp="$nightly_day"
          release_prefix="Nightly"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            nightly_stamp="$(date -u +%Y%m%d.%H%M%S)"
            release_prefix="Manual Nightly"
          fi
          release_tag="v${base_version}-nightly.${nightly_stamp}"
          release_name="${release_prefix} ${release_tag}"
          {
            echo "base_version=$base_version"
            echo "nightly_stamp=$nightly_stamp"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    needs:
      - change-detection
      - metadata
    if: needs.change-detection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux x86 toolchain
        if: matrix.arch == 'x86'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - id: package
        shell: bash
        env:
          NIGHTLY_STAMP: ${{ needs.metadata.outputs.nightly_stamp }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          OBLIVION_ARCH: ${{ matrix.arch }}
        run: bash scripts/release/nightly-linux.sh ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-${{ matrix.arch }}
          path: ${{ steps.package.outputs.archive_path }}

  build-macos:
    needs:
      - change-detection
      - metadata
    if: needs.change-detection.outputs.should_run == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64
    steps:
      - uses: actions/checkout@v4
      - id: package
        shell: bash
        env:
          NIGHTLY_STAMP: ${{ needs.metadata.outputs.nightly_stamp }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          OBLIVION_ARCH: ${{ matrix.arch }}
        run: bash scripts/release/nightly-macos.sh ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-${{ matrix.arch }}
          path: ${{ steps.package.outputs.archive_path }}

  build-windows:
    needs:
      - change-detection
      - metadata
    if: needs.change-detection.outputs.should_run == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64
    steps:
      - uses: actions/checkout@v4
      - id: package
        shell: pwsh
        env:
          NIGHTLY_STAMP: ${{ needs.metadata.outputs.nightly_stamp }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          OBLIVION_ARCH: ${{ matrix.arch }}
        run: ./scripts/release/nightly-windows.ps1 -Arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-${{ matrix.arch }}
          path: ${{ steps.package.outputs.archive_path }}

  release:
    needs:
      - change-detection
      - metadata
      - build-linux
      - build-macos
      - build-windows
    if: needs.change-detection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: release-assets
          merge-multiple: true
      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: |
            release-assets/*.tar.gz
            release-assets/*.zip
          artifactErrorsFailBuild: true
          body: |
            Automated nightly build for Oblivion Reverse.
            
            Base version: `${{ needs.metadata.outputs.base_version }}`
            Nightly stamp: `${{ needs.metadata.outputs.nightly_stamp }}`
            
            Scheduled runs use a date-only nightly tag. Manual dispatches use a UTC timestamp suffix so each dispatch creates a distinct release.
            Archive names now include both platform and architecture, for example `oblivion-windows-x64-${{ needs.metadata.outputs.release_tag }}.zip`.
            Each archive contains an `oblivion/` folder with the platform game module and `oblivion.cfg`.
          makeLatest: false
          name: ${{ needs.metadata.outputs.release_name }}
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ needs.metadata.outputs.release_tag }}
